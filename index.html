<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>W12 Quiz</title>
  <style>
    :root {
      --bg1: #ffd2c7;
      --bg2: #ffe7dc;
      --card: #fff7f4;
      --card2: #fff0ea;
      --ink: #2b2b2b;
      --muted: #6b6b6b;
      --accent: #ff6f91;
      --accent2: #ff9671;
      --ok: #18a558;
      --bad: #d64550;
      --shadow: 0 18px 45px rgba(0, 0, 0, .12);
      --shadow2: 0 14px 30px rgba(0, 0, 0, .10);
      --radius: 22px;
      --radius2: 16px;
      --focus: 0 0 0 4px rgba(255, 111, 145, .25);
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 20% 10%, var(--bg2), transparent 60%),
        radial-gradient(900px 600px at 90% 30%, #ffd7e8, transparent 55%),
        radial-gradient(900px 600px at 60% 90%, #fff3cc, transparent 60%),
        linear-gradient(160deg, var(--bg1), #fff 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      overflow-x: hidden;
    }

    /* subtle floating blobs */
    .blob {
      position: fixed;
      filter: blur(28px);
      opacity: .55;
      z-index: 0;
      pointer-events: none;
    }

    .blob.b1 {
      width: 280px;
      height: 280px;
      left: -60px;
      top: -60px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 111, 145, .55), transparent 55%);
      animation: float1 8s ease-in-out infinite;
    }

    .blob.b2 {
      width: 320px;
      height: 320px;
      right: -90px;
      top: 40px;
      background: radial-gradient(circle at 45% 35%, rgba(255, 150, 113, .55), transparent 58%);
      animation: float2 10s ease-in-out infinite;
    }

    .blob.b3 {
      width: 360px;
      height: 360px;
      left: 40%;
      bottom: -140px;
      background: radial-gradient(circle at 40% 40%, rgba(255, 215, 232, .65), transparent 60%);
      animation: float3 12s ease-in-out infinite;
    }

    @keyframes float1 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(20px, 18px)
      }
    }

    @keyframes float2 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(-18px, 22px)
      }
    }

    @keyframes float3 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(14px, -12px)
      }
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
      align-items: stretch;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      position: relative;
      overflow: hidden;
      transform: translateY(0);
      transition: transform .25s ease, box-shadow .25s ease;
    }

    .panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 55px rgba(0, 0, 0, .14);
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: -80px -120px auto auto;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 111, 145, .35), transparent 60%);
      transform: rotate(12deg);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .badge {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 24px rgba(255, 111, 145, .25);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      letter-spacing: .5px;
      position: relative;
      overflow: hidden;
    }

    .badge::before {
      content: "";
      position: absolute;
      inset: -60% -40%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .35), transparent);
      transform: rotate(25deg);
      animation: shine 2.8s ease-in-out infinite;
    }

    @keyframes shine {
      0% {
        transform: translateX(-60%) rotate(25deg)
      }

      60% {
        transform: translateX(70%) rotate(25deg)
      }

      100% {
        transform: translateX(70%) rotate(25deg)
      }
    }

    h1 {
      font-size: 22px;
      margin: 0;
      line-height: 1.15;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13.5px;
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      background: linear-gradient(180deg, #ffe9e1, #fff6f3);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .right::before {
      content: "";
      position: absolute;
      left: -120px;
      bottom: -120px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle at 60% 40%, rgba(255, 150, 113, .35), transparent 62%);
      pointer-events: none;
    }

    .kicker {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 111, 145, .12);
      border: 1px solid rgba(255, 111, 145, .22);
      width: max-content;
      box-shadow: 0 10px 20px rgba(0, 0, 0, .05);
    }

    .pill b {
      color: var(--accent);
    }

    .progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .bar {
      flex: 1;
      height: 10px;
      background: rgba(0, 0, 0, .06);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar>div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      transition: width .45s cubic-bezier(.2, .9, .2, 1);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 6px;
    }

    /* nicer dropdown */
    .selectWrap {
      position: relative;
    }

    .selectWrap::after {
      content: "▾";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(0, 0, 0, .45);
      pointer-events: none;
      font-size: 16px;
    }

    select,
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 44px 12px 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .06);
      transition: box-shadow .2s ease, transform .08s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    select:focus,
    button:focus {
      box-shadow: var(--shadow2), var(--focus);
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 800;
      letter-spacing: .2px;
    }

    button:hover {
      filter: saturate(1.05) brightness(1.02);
    }

    button:active {
      transform: translateY(1px) scale(.995);
    }

    button.ghost {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(0, 0, 0, .08);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .06);
      padding: 12px;
    }

    button.ghost:hover {
      filter: none;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* Screen transitions */
    .screen {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .22s ease, transform .22s ease;
    }

    .screen.out {
      opacity: 0;
      transform: translateY(10px);
    }

    .screen.in {
      opacity: 0;
      transform: translateY(-8px);
    }

    .qwrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qtitle {
      font-size: 18px;
      margin: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: -4px;
    }

    .chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .04);
      border: 1px solid rgba(0, 0, 0, .07);
      color: rgba(0, 0, 0, .65);
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .choice {
      border: 1px solid rgba(0, 0, 0, .08);
      background: #fff;
      border-radius: 16px;
      padding: 12px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      box-shadow: 0 10px 22px rgba(0, 0, 0, .05);
      cursor: pointer;
      user-select: none;
      transition: transform .08s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
    }

    .choice:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 111, 145, .35);
      box-shadow: 0 14px 26px rgba(0, 0, 0, .07);
    }

    .choice:active {
      transform: translateY(0px) scale(.997);
    }

    .bubble {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: rgba(255, 111, 145, .15);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: var(--accent);
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .choice.selected {
      border-color: rgba(255, 111, 145, .75);
      box-shadow: 0 16px 30px rgba(255, 111, 145, .12);
      background: rgba(255, 111, 145, .06);
    }

    .footerRow {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .footerRow>* {
      flex: 1;
    }

    .tiny {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .warn {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(214, 69, 80, .08);
      border: 1px solid rgba(214, 69, 80, .25);
      color: #8a1f28;
      font-size: 13px;
      margin-top: 10px;
    }

    .okbox {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(24, 165, 88, .10);
      border: 1px solid rgba(24, 165, 88, .22);
      color: #0f5b31;
      font-size: 13px;
      margin-top: 10px;
    }

    /* Final screen aesthetics */
    .finalCard {
      margin-top: 8px;
      border-radius: 22px;
      padding: 16px;
      background: linear-gradient(135deg, rgba(255, 111, 145, .14), rgba(255, 150, 113, .14));
      border: 1px solid rgba(255, 111, 145, .22);
      box-shadow: 0 16px 38px rgba(0, 0, 0, .08);
      position: relative;
      overflow: hidden;
      transform-origin: center;
      animation: pop .6s cubic-bezier(.2, 1, .2, 1) both;
    }

    @keyframes pop {
      0% {
        transform: scale(.92);
        opacity: 0
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    .finalCard::before {
      content: "";
      position: absolute;
      inset: -60% -30% auto auto;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, .65), transparent 60%);
      transform: rotate(18deg);
      opacity: .55;
      pointer-events: none;
    }

    .scoreBig {
      font-size: 44px;
      font-weight: 950;
      margin: 4px 0 0;
      letter-spacing: -1px;
    }

    .scoreSub {
      margin: 6px 0 0;
      color: rgba(0, 0, 0, .62);
    }

    .sparkRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .spark {
      flex: 1;
      min-width: 140px;
      background: rgba(255, 255, 255, .75);
      border: 1px solid rgba(0, 0, 0, .06);
      border-radius: 16px;
      padding: 10px 12px;
    }

    .spark b {
      color: rgba(0, 0, 0, .78);
    }

    /* Confetti */
    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .confetti i {
      position: absolute;
      width: 10px;
      height: 14px;
      border-radius: 3px;
      opacity: .9;
      animation: fall 1.8s linear forwards;
      transform: translateY(-20px) rotate(0deg);
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(420deg);
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        options: [{ t: "Internal conditions remain stable around set points", correct: true }, { t: "Response is amplified continuously", correct: false }, { t: "Hormone secretion increases exponentially", correct: false }, { t: "Body temperature fluctuates widely", correct: false }]
      },
      {

        options: [{ t: "Glucagon", correct: true }, { t: "Insulin", correct: false }, { t: "ADH", correct: false }, { t: "Calcitonin", correct: false }]
      },
      {

      },
      {

      },

        options: [{ t: "Storing neurotransmitters", correct: true }, { t: "Generating membrane potential", correct: false }, { t: "Synthesising ATP", correct: false }, { t: "Repolarising the membrane", correct: false }]
      },
      {

        options: [{ t: "Increased CO₂ production", correct: true }, { t: "Increased lactic acid", correct: true }, { t: "Blood pH increases", correct: false }, { t: "Respiration rate decreases drastically", correct: false }]
      },
      {

        options: [{ t: "Failure to regenerate NAD⁺ (NADH accumulates)", correct: true }, { t: "Increased photophosphorylation", correct: false }, { t: "Increased carbon fixation", correct: false }, { t: "ATP synthase denatures", correct: false }]
      },
      {

        options: [{ t: "ETC – inner mitochondrial membrane", correct: true }, { t: "Glycolysis – mitochondrial matrix", correct: false }, { t: "Krebs cycle – cytoplasm", correct: false }, { t: "Calvin cycle – thylakoid membrane", correct: false }]
      },
      {
        key: "low_adh", stems: ["Low ADH secretion results in…", "Too little ADH leads to…", "A person with insufficient ADH will likely have…"], type: "single",
        options: [{ t: "Large volume of dilute urine", correct: true }, { t: "Small volume of concentrated urine", correct: false }, { t: "Increased water reabsorption", correct: false }, { t: "Increased blood pressure immediately", correct: false }]
      },
      {
        key: "demyelination", stems: ["Damage to myelin sheath causes…", "Loss of myelin sheath will most likely cause…", "Demyelination is associated with…"], type: "single",
        options: [{ t: "Slower conduction because impulses can’t jump nodes efficiently", correct: true }, { t: "Faster impulse due to ion leak", correct: false }, { t: "No change in conduction speed", correct: false }, { t: "Increased synaptic vesicle release", correct: false }]
      },
    ];

    function mulberry32(seed) { let a = seed >>> 0; return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
    function hashString(str) { let h = 2166136261; for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
    function shuffle(arr, rnd = Math.random) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rnd() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

    function buildSet(setNo, rnd) {
      const stemRnd = mulberry32(hashString("W12_STEMS_" + setNo));
      const qList = BASE_QUESTIONS.map((q, idx) => {
        const stem = q.stems[(idx + Math.floor(stemRnd() * q.stems.length) + setNo) % q.stems.length];
        const options = shuffle(q.options, rnd).map(o => ({ ...o }));
        return { key: q.key, stem, type: q.type, instruction: q.instruction || null, options };
      });
      return shuffle(qList, rnd);
    }

    /* =========================
       SOUND
    ========================= */
    let audioCtx = null;
    function ensureAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } }

    function playTone(type) {
      ensureAudio();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      if (type === "ok") {
        o.frequency.setValueAtTime(660, t0);
        o.frequency.exponentialRampToValueAtTime(880, t0 + 0.08);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.18, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0); o.stop(t0 + 0.20);
      } else {
        o.frequency.setValueAtTime(220, t0);
        o.frequency.exponentialRampToValueAtTime(170, t0 + 0.10);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.16, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0); o.stop(t0 + 0.24);
      }
    }

    // Extravagant finish sound (short celebratory arpeggio)
    function playFinishFanfare() {
      ensureAudio();
      const t0 = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6

      notes.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "triangle";
        const start = t0 + i * 0.07;
        const end = start + 0.20;
        o.frequency.setValueAtTime(f, start);
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.22, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, end);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(start);
        o.stop(end);
      });

      // final sparkle chord
      const chord = [659.25, 783.99, 987.77];
      chord.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "sine";
        const start = t0 + 0.34;
        const end = start + 0.35;
        o.frequency.setValueAtTime(f, start);
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.14, start + 0.03);
        g.gain.exponentialRampToValueAtTime(0.0001, end);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(start);
        o.stop(end);
      });
    }

    /* =========================
       STATE
    ========================= */
    const screen = document.getElementById("screen");
    const studentLabel = document.getElementById("studentLabel");
    const statusLabel = document.getElementById("statusLabel");
    const progressText = document.getElementById("progressText");
    const barFill = document.getElementById("barFill");
    const confetti = document.getElementById("confetti");

    const APP_STATE = {
      class: null,
      name: null,
      locked: false,
      setNo: null,
      rnd: null,
      questions: [],
      qIndex: 0,
      answers: [],
      score: 0,
      // per-question timer only
      timerEndAt: null,
      timerIntervalId: null,
      timerEndAt: null,         // timestamp in ms
      timerIntervalId: null,
    };

    function storageKey() {
      const c = APP_STATE.class || "";
      const n = APP_STATE.name || "";
      return `W12QUIZ_ATTEMPT_${c}__${n}`;
    }
    function loadAttempt() {
      const k = storageKey();
      const raw = localStorage.getItem(k);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }
    function saveAttempt(payload) { localStorage.setItem(storageKey(), JSON.stringify(payload)); }

    function updateRight() {
      studentLabel.textContent = (APP_STATE.class && APP_STATE.name) ? `${APP_STATE.class} • ${APP_STATE.name}` : "—";
      if (APP_STATE.questions.length) {
        progressText.textContent = `${APP_STATE.qIndex + 1} / ${APP_STATE.questions.length}`;
        barFill.style.width = `${((APP_STATE.qIndex) / APP_STATE.questions.length) * 100}%`;
        statusLabel.textContent = "In progress";
      } else {
        progressText.textContent = "—";
        barFill.style.width = `0%`;
        statusLabel.textContent = "Not started";
      }
    }

    function transitionTo(html) {
      screen.classList.add('out');
      setTimeout(() => {
        screen.innerHTML = html;
        screen.classList.remove('out');
      }, 160);
    }

    function clamp2Selections(arr) { return arr.slice(0, 2); }

    /* =========================
       SCREENS
    ========================= */
    function renderStart() {
      APP_STATE.class = null;
      APP_STATE.name = null;
      APP_STATE.locked = false;
      APP_STATE.setNo = null;
      APP_STATE.questions = [];
      APP_STATE.qIndex = 0;
      APP_STATE.answers = [];
      APP_STATE.score = 0;
      updateRight();

      transitionTo(`
    <div class="qwrap">
      <div class="chips">
        <span class="chip">✨ Cute UI</span>
        <span class="chip">🔒 One attempt</span>
        <span class="chip">🔊 Sounds</span>
      </div>
      <h2 class="qtitle">Before we start… choose your class & name 👇</h2>
      <p class="hint">Please don’t refresh while answering (your attempt will lock).</p>

      <label>Class</label>
      <div class="selectWrap">
        <select id="classSel">
          <option value="" selected disabled>Choose class…</option>
          <option value="H11">H11</option>
          <option value="H12">H12</option>
          <option value="H02">H02</option>
        </select>
      </div>

      <label>Name</label>
      <div class="selectWrap">
        <select id="nameSel" disabled>
          <option value="" selected disabled>Choose name…</option>
        </select>
      </div>

      <div class="footerRow">
        <button class="ghost" id="howBtn" type="button">How it works</button>
        <button id="startBtn" type="button" disabled>Start W12 Quiz</button>
      </div>

      <div id="msgBox"></div>
    </div>
  `);

      setTimeout(() => {
        const classSel = document.getElementById("classSel");
        const nameSel = document.getElementById("nameSel");
        const startBtn = document.getElementById("startBtn");
        const howBtn = document.getElementById("howBtn");
        const msgBox = document.getElementById("msgBox");

        classSel.addEventListener("change", () => {
          APP_STATE.class = classSel.value;
          nameSel.disabled = false;
          nameSel.innerHTML = `<option value="" selected disabled>Choose name…</option>` +
            STUDENTS[APP_STATE.class].map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join("");
          startBtn.disabled = true;
          msgBox.innerHTML = "";
          updateRight();
        });

        nameSel.addEventListener("change", () => {
          APP_STATE.name = nameSel.value;
          updateRight();

          const attempt = loadAttempt();
          if (attempt?.submitted) {
            APP_STATE.locked = true;
            startBtn.disabled = true;
            msgBox.innerHTML = `
          <div class="warn">
            <b>Locked.</b> You already submitted this quiz earlier.<br>
            Score recorded: <b>${attempt.score}/${attempt.total}</b>
          </div>
        `;
          } else {
            APP_STATE.locked = false;
            startBtn.disabled = false;
            msgBox.innerHTML = `
          <div class="okbox">✅ Ready! Once you start, this attempt is locked.</div>
        `;
          }
        });

        howBtn.addEventListener("click", () => {
          msgBox.innerHTML = `
        <div class="okbox">
          <b>How it works:</b><br>
          • You’ll get <b>20 questions</b>.<br>
          • Some questions are <b>Select TWO</b>.<br>
          • End page shows your score — <b>screenshot</b> and send to class group.
        </div>
      `;
        });

        startBtn.addEventListener("click", () => {
          ensureAudio();
          startQuiz();
        });
      }, 170);
    }

    function startQuiz() {
      if (!APP_STATE.class || !APP_STATE.name) return;

      const studentSeed = hashString(`W12_${APP_STATE.class}_${APP_STATE.name}_${new Date().toDateString()}`);
      const rnd = mulberry32(studentSeed);
      const setNo = 1 + Math.floor(rnd() * 10);

      APP_STATE.setNo = setNo;
      APP_STATE.rnd = rnd;

      APP_STATE.questions = buildSet(setNo, rnd);
      APP_STATE.qIndex = 0;
      APP_STATE.answers = Array(APP_STATE.questions.length).fill(null);
      APP_STATE.score = 0;

      const attempt = loadAttempt();
      if (attempt?.submitted) {
        renderLocked(attempt);
        return;
      }

      saveAttempt({ submitted: false, startedAt: Date.now(), total: APP_STATE.questions.length });

      startTimer();   // ⏱ start countdown
      updateRight();
      renderQuestion();
    }

    function renderLocked(attempt) {
      updateRight();
      transitionTo(`
    <div class="qwrap">
      <h2 class="qtitle">This attempt is locked 🔒</h2>
      <p class="hint">You already submitted earlier.</p>
      <div class="finalCard">
        <div class="scoreBig">${attempt.score} / ${attempt.total}</div>
        <p class="scoreSub"><b>${escapeHtml(APP_STATE.name || '')}</b> • ${escapeHtml(APP_STATE.class || '')}</p>
      </div>
      <div class="warn">If you think this is an error, show Miss Hanisu your proof (screenshot).</div>
      <div class="footerRow">
        <button class="ghost" onclick="location.reload()">Reload</button>
        <button disabled>Start</button>
      </div>
    </div>
  `);
    }

    function renderQuestion() {
      const q = APP_STATE.questions[APP_STATE.qIndex];
      updateRight();
      startTimerPerQuestion();  // <<< PASTE THIS LINE HERE

      const isMulti = q.type === "multi2";
      const instr = q.instruction
        ? `<p class="hint"><b>${escapeHtml(q.instruction)}</b></p>`
        : `<p class="hint">${isMulti ? "<b>Select TWO answers.</b>" : "Choose ONE answer."}</p>`;

      const selected = APP_STATE.answers[APP_STATE.qIndex] || [];

      transitionTo(`
    <div class="qwrap">
      <div class="chips">
        <span class="chip">Question ${APP_STATE.qIndex + 1} / ${APP_STATE.questions.length}</span>
        <span class="chip">${isMulti ? "Select TWO" : "Single answer"}</span>
      </div>
      <h2 class="qtitle">${escapeHtml(q.stem)}</h2>
      ${instr}
      <div class="choices" id="choices"></div>
      <div class="footerRow">
        <button class="ghost" id="backBtn" type="button" ${APP_STATE.qIndex === 0 ? "disabled" : ""}>Back</button>
        <button id="nextBtn" type="button" disabled>${APP_STATE.qIndex === APP_STATE.questions.length - 1 ? "Submit" : "Next"}</button>
      </div>
      <div class="tiny">Choose carefully — one attempt only 👀</div>
    </div>
  `);

      setTimeout(() => {
        const choicesEl = document.getElementById("choices");
        const nextBtn = document.getElementById("nextBtn");
        const backBtn = document.getElementById("backBtn");

        q.options.forEach((opt, idx) => {
          const letter = String.fromCharCode(65 + idx);
          const div = document.createElement("div");
          div.className = "choice" + (selected.includes(idx) ? " selected" : "");
          div.innerHTML = `<div class="bubble">${letter}</div><div>${escapeHtml(opt.t)}</div>`;

          div.addEventListener("click", () => {
            let sel = APP_STATE.answers[APP_STATE.qIndex];
            if (!sel) sel = [];
            sel = sel.slice();

            if (isMulti) {
              if (sel.includes(idx)) sel = sel.filter(x => x !== idx);
              else { sel.push(idx); sel = clamp2Selections(sel); }
            } else {
              sel = [idx];
            }

            APP_STATE.answers[APP_STATE.qIndex] = sel;

            [...choicesEl.children].forEach((child, cIdx) => {
              child.classList.toggle("selected", sel.includes(cIdx));
            });

            nextBtn.disabled = isMulti ? (sel.length !== 2) : (sel.length !== 1);
          });

          choicesEl.appendChild(div);
        });

        nextBtn.disabled = isMulti ? (selected.length !== 2) : (selected.length !== 1);

        backBtn?.addEventListener("click", () => {
          APP_STATE.qIndex--;
          renderQuestion();
        });

        nextBtn.addEventListener("click", () => {
          clearInterval(APP_STATE.timerIntervalId); // 👈 ADD THIS
          const correctIdx = q.options.map((o, i) => ({ o, i })).filter(x => x.o.correct).map(x => x.i);
          const sel = APP_STATE.answers[APP_STATE.qIndex] || [];
          const isCorrect = arraysEqual(sorted(sel), sorted(correctIdx));
          playTone(isCorrect ? "ok" : "bad");

          if (APP_STATE.qIndex < APP_STATE.questions.length - 1) {
            APP_STATE.qIndex++;
            renderQuestion();
          } else {
            submitQuiz();
          }
        });
      }, 170);
    }

    function submitQuiz() {
      let score = 0;
      APP_STATE.questions.forEach((q, qi) => {
        const sel = APP_STATE.answers[qi] || [];
        const correctIdx = q.options.map((o, i) => ({ o, i })).filter(x => x.o.correct).map(x => x.i);
        if (arraysEqual(sorted(sel), sorted(correctIdx))) score += 1;
      });
      APP_STATE.score = score;

      saveAttempt({ submitted: true, submittedAt: Date.now(), score, total: APP_STATE.questions.length });
      renderFinal();
    }

    function burstConfetti() {
      confetti.innerHTML = "";
      const colors = ["#ff6f91", "#ff9671", "#ffd166", "#06d6a0", "#4cc9f0", "#f4a7c1"];
      const count = 90;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('i');
        const left = Math.random() * 100;
        const delay = Math.random() * 0.3;
        const dur = 1.3 + Math.random() * 0.9;
        const w = 8 + Math.random() * 6;
        const h = 10 + Math.random() * 10;
        el.style.left = left + 'vw';
        el.style.top = (-10 - Math.random() * 20) + 'px';
        el.style.width = w + 'px';
        el.style.height = h + 'px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = delay + 's';
        el.style.animationDuration = dur + 's';
        confetti.appendChild(el);
      }
      setTimeout(() => { confetti.innerHTML = ""; }, 2400);
    }

    function renderFinal() {
      updateRight();
      barFill.style.width = `100%`;
      progressText.textContent = `${APP_STATE.questions.length} / ${APP_STATE.questions.length}`;
      statusLabel.textContent = "Submitted";

      // celebration
      burstConfetti();
      playFinishFanfare();

      const message = scoreMessage(APP_STATE.score, APP_STATE.questions.length);

      transitionTo(`
    <div class="qwrap">
      <div class="chips">
        <span class="chip">✅ Completed</span>
        <span class="chip">🔒 Locked</span>
        <span class="chip">📸 Screenshot</span>
      </div>
      <h2 class="qtitle">${message.title}</h2>
      <p class="hint">${message.subtitle}</p>

      <div class="finalCard">
        <div class="scoreBig">${APP_STATE.score} / ${APP_STATE.questions.length}</div>
        <p class="scoreSub"><b>${escapeHtml(APP_STATE.name)}</b> • ${escapeHtml(APP_STATE.class)}</p>

        <div class="sparkRow">
          <div class="spark"><b>Next step</b><br>Screenshot this page ✅</div>
          <div class="spark"><b>Send to</b><br>Your class group chat 💬</div>
        </div>

        <div class="okbox" style="margin-top:12px;">
          📸 <b>Screenshot this result</b> and send to your class group.
        </div>
      </div>

      <div class="footerRow">
        <button class="ghost" type="button" onclick="location.reload()">Reload page</button>
        <button type="button" disabled>Submitted ✔</button>
      </div>

      <div class="tiny">
        If your score looks wrong, screenshot the question + your selection and tell Miss Hanisu.
      </div>
    </div>
  `);
    }

    function scoreMessage(score, total) {
      const pct = (score / total) * 100;
      if (pct >= 90) return { title: "Slayyyy 😭✨", subtitle: "That was clean. Screenshot and send it to your class group." };
      if (pct >= 75) return { title: "Nice work 💖", subtitle: "Good job. Screenshot and send it to your class group." };
      if (pct >= 50) return { title: "Okayyy we move 😌", subtitle: "Not bad. Screenshot and send it to your class group." };
      return { title: "It’s okay bestie 😭", subtitle: "Try to review the topic after this. Screenshot and send it to your class group." };
    }

    /* =========================
       HELPERS
    ========================= */
    const TIMER_PER_QUESTION_SEC = 20; // 👈 ADD THIS

    function startTimerPerQuestion() {
      clearInterval(APP_STATE.timerIntervalId);

      APP_STATE.timerEndAt = Date.now() + TIMER_PER_QUESTION_SEC * 1000;

      APP_STATE.timerIntervalId = setInterval(() => {
        const remainingMs = Math.max(0, APP_STATE.timerEndAt - Date.now());
        const sec = Math.ceil(remainingMs / 1000);

        progressText.textContent =
          `${APP_STATE.qIndex + 1} / ${APP_STATE.questions.length} • ⏱ ${sec}s`;

        if (remainingMs <= 0) {
          clearInterval(APP_STATE.timerIntervalId);

          if (APP_STATE.qIndex < APP_STATE.questions.length - 1) {
            APP_STATE.qIndex++;
            renderQuestion();
          } else {
            submitQuiz();
          }
        }
      }, 200);
    }
    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function sorted(a) { return a.slice().sort((x, y) => x - y); }
    function arraysEqual(a, b) { if (a.length !== b.length) return false; for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false; return true; }
    /* =========================
       TIMER
    ========================= */
    function startTimer() {
      APP_STATE.timerEndAt = Date.now() + APP_STATE.timerTotalSec * 1000;

      APP_STATE.timerIntervalId = setInterval(() => {
        const now = Date.now();
        const remaining = Math.max(0, APP_STATE.timerEndAt - now);

        const sec = Math.floor(remaining / 1000);
        const min = Math.floor(sec / 60);
        const s = sec % 60;

        // show timer in right panel progress text
        progressText.textContent =
          `${APP_STATE.qIndex + 1} / ${APP_STATE.questions.length} • ⏱ ${String(min).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        if (remaining <= 0) {
          clearInterval(APP_STATE.timerIntervalId);
          submitQuiz(); // auto submit when time up ⏰
        }
      }, 1000);
    }
    /* =========================
       BOOT
    ========================= */
    renderStart();
  </script>
