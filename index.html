<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>W12 Quiz</title>
  <style>
    :root {
      --bg1: #ffd2c7;
      --bg2: #ffe7dc;
      --card: #fff7f4;
      --card2: #fff0ea;
      --ink: #2b2b2b;
      --muted: #6b6b6b;
      --accent: #ff6f91;
      --accent2: #ff9671;
      --ok: #18a558;
      --bad: #d64550;
      --shadow: 0 18px 45px rgba(0, 0, 0, .12);
      --shadow2: 0 14px 30px rgba(0, 0, 0, .10);
      --radius: 22px;
      --radius2: 16px;
      --focus: 0 0 0 4px rgba(255, 111, 145, .25);
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji"
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--ink);
      background: radial-gradient(1200px 700px at 20% 10%, var(--bg2), transparent 60%),
        radial-gradient(900px 600px at 90% 30%, #ffd7e8, transparent 55%),
        radial-gradient(900px 600px at 60% 90%, #fff3cc, transparent 60%),
        linear-gradient(160deg, var(--bg1), #fff 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      overflow-x: hidden;
    }

    .blob {
      position: fixed;
      filter: blur(28px);
      opacity: .55;
      z-index: 0;
      pointer-events: none
    }

    .blob.b1 {
      width: 280px;
      height: 280px;
      left: -60px;
      top: -60px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 111, 145, .55), transparent 55%);
      animation: float1 8s ease-in-out infinite
    }

    .blob.b2 {
      width: 320px;
      height: 320px;
      right: -90px;
      top: 40px;
      background: radial-gradient(circle at 45% 35%, rgba(255, 150, 113, .55), transparent 58%);
      animation: float2 10s ease-in-out infinite
    }

    .blob.b3 {
      width: 360px;
      height: 360px;
      left: 40%;
      bottom: -140px;
      background: radial-gradient(circle at 40% 40%, rgba(255, 215, 232, .65), transparent 60%);
      animation: float3 12s ease-in-out infinite
    }

    @keyframes float1 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(20px, 18px)
      }
    }

    @keyframes float2 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(-18px, 22px)
      }
    }

    @keyframes float3 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(14px, -12px)
      }
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
      align-items: stretch;
      position: relative;
      z-index: 1
    }

    .panel {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      position: relative;
      overflow: hidden;
      transform: translateY(0);
      transition: transform .25s ease, box-shadow .25s ease
    }

    .panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 55px rgba(0, 0, 0, .14)
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: -80px -120px auto auto;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 111, 145, .35), transparent 60%);
      transform: rotate(12deg);
      pointer-events: none
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px
    }

    .badge {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 24px rgba(255, 111, 145, .25);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      letter-spacing: .5px;
      position: relative;
      overflow: hidden
    }

    .badge::before {
      content: "";
      position: absolute;
      inset: -60% -40%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .35), transparent);
      transform: rotate(25deg);
      animation: shine 2.8s ease-in-out infinite
    }

    @keyframes shine {
      0% {
        transform: translateX(-60%) rotate(25deg)
      }

      60% {
        transform: translateX(70%) rotate(25deg)
      }

      100% {
        transform: translateX(70%) rotate(25deg)
      }
    }

    h1 {
      font-size: 22px;
      margin: 0;
      line-height: 1.15
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13.5px
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      background: linear-gradient(180deg, #ffe9e1, #fff6f3);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden
    }

    .right::before {
      content: "";
      position: absolute;
      left: -120px;
      bottom: -120px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle at 60% 40%, rgba(255, 150, 113, .35), transparent 62%);
      pointer-events: none
    }

    .kicker {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 111, 145, .12);
      border: 1px solid rgba(255, 111, 145, .22);
      width: max-content;
      box-shadow: 0 10px 20px rgba(0, 0, 0, .05)
    }

    .pill b {
      color: var(--accent)
    }

    .progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px
    }

    .bar {
      flex: 1;
      height: 10px;
      background: rgba(0, 0, 0, .06);
      border-radius: 999px;
      overflow: hidden
    }

    .bar>div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      transition: width .45s cubic-bezier(.2, .9, .2, 1)
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 6px
    }

    .selectWrap {
      position: relative
    }

    .selectWrap::after {
      content: "▾";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(0, 0, 0, .45);
      pointer-events: none;
      font-size: 16px
    }

    select,
    button,
    input {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 44px 12px 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .06);
      transition: box-shadow .2s ease, transform .08s ease;
      appearance: none;
      -webkit-appearance: none
    }

    input {
      padding: 12px
    }

    select:focus,
    button:focus,
    input:focus {
      box-shadow: var(--shadow2), var(--focus)
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 800;
      letter-spacing: .2px
    }

    button:hover {
      filter: saturate(1.05) brightness(1.02)
    }

    button:active {
      transform: translateY(1px) scale(.995)
    }

    button.ghost {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(0, 0, 0, .08);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .06);
      padding: 12px
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed
    }

    .screen {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .22s ease, transform .22s ease
    }

    .screen.out {
      opacity: 0;
      transform: translateY(10px)
    }

    .qwrap {
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .qtitle {
      font-size: 18px;
      margin: 0
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: -4px
    }

    .chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .04);
      border: 1px solid rgba(0, 0, 0, .07);
      color: rgba(0, 0, 0, .65)
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 8px
    }

    .choice {
      border: 1px solid rgba(0, 0, 0, .08);
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      box-shadow: 0 10px 22px rgba(0, 0, 0, .05);
      cursor: pointer;
      user-select: none;
      transition: transform .08s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease
    }

    .choice:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 111, 145, .35);
      box-shadow: 0 14px 26px rgba(0, 0, 0, .07)
    }

    .bubble {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: rgba(255, 111, 145, .15);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: var(--accent);
      flex: 0 0 auto;
      margin-top: 1px
    }

    .choice.selected {
      border-color: rgba(255, 111, 145, .75);
      box-shadow: 0 16px 30px rgba(255, 111, 145, .12);
      background: rgba(255, 111, 145, .06)
    }

    .footerRow {
      display: flex;
      gap: 10px;
      margin-top: 8px
    }

    .footerRow>* {
      flex: 1
    }

    .tiny {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4
    }

    .warn {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(214, 69, 80, .08);
      border: 1px solid rgba(214, 69, 80, .25);
      color: #8a1f28;
      font-size: 13px;
      margin-top: 10px
    }

    .okbox {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(24, 165, 88, .10);
      border: 1px solid rgba(24, 165, 88, .22);
      color: #0f5b31;
      font-size: 13px;
      margin-top: 10px
    }

    .finalCard {
      margin-top: 8px;
      border-radius: 22px;
      padding: 16px;
      background: linear-gradient(135deg, rgba(255, 111, 145, .14), rgba(255, 150, 113, .14));
      border: 1px solid rgba(255, 111, 145, .22);
      box-shadow: 0 16px 38px rgba(0, 0, 0, .08);
      position: relative;
      overflow: hidden;
      transform-origin: center;
      animation: pop .6s cubic-bezier(.2, 1, .2, 1) both
    }

    @keyframes pop {
      0% {
        transform: scale(.92);
        opacity: 0
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    .scoreBig {
      font-size: 44px;
      font-weight: 950;
      margin: 4px 0 0;
      letter-spacing: -1px
    }

    .scoreSub {
      margin: 6px 0 0;
      color: rgba(0, 0, 0, .62)
    }

    .sparkRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px
    }

    .spark {
      flex: 1;
      min-width: 140px;
      background: rgba(255, 255, 255, .75);
      border: 1px solid rgba(0, 0, 0, .06);
      border-radius: 16px;
      padding: 10px 12px
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden
    }

    .confetti i {
      position: absolute;
      width: 10px;
      height: 14px;
      border-radius: 3px;
      opacity: .9;
      animation: fall 1.8s linear forwards;
      transform: translateY(-20px) rotate(0deg)
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(420deg);
        opacity: 1
      }
    }

    .swooshIn {
      animation: swooshIn .35s cubic-bezier(.2, .9, .2, 1) both
    }

    @keyframes swooshIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(.98);
        filter: blur(2px)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0)
      }
    }

    .hide {
      display: none !important
    }

    @media (max-width:900px) {
      .app {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <div class="app">
    <div class="panel" id="leftPanel">
      <div class="brand">
        <div class="badge">W12</div>
        <div>
          <h1>W12 Quiz</h1>
          <p class="sub">One attempt only • shuffled questions • sound effects</p>
        </div>
      </div>
      <div id="screen" class="screen"></div>
    </div>

    <div class="right" id="rightPanel">
      <div class="kicker">
        <span class="pill">Student: <b id="studentLabel">—</b></span>
        <span class="pill">Status: <b id="statusLabel">Not started</b></span>
      </div>
      <div class="progress">
        <div>Progress</div>
        <div><span id="progressText">—</span></div>
      </div>
      <div class="bar">
        <div id="barFill"></div>
      </div>
      <div class="tiny" id="rulesText">
        <b>Rules:</b><br>
        • You only get <b>1 attempt</b>. Once submitted, it’s locked.<br>
        • Some questions are <b>Select TWO</b> — choose exactly 2.<br>
        • End screen shows your score — <b>screenshot</b> and send to class group.
      </div>
    </div>
  </div>

  <script>
    /* =========================
       SOUND (single, consistent)
    ========================= */
    const SFX = {
      panic: new Audio("blaring.mp3"),
      gameover: new Audio("gameover.mp3"),
    };

    Object.values(SFX).forEach(a => {
      a.preload = "auto";
      a.volume = 0.9;
    });

    function stopSfx(audio) {
      if (!audio) return;
      try {
        audio.pause();
        audio.currentTime = 0;
      } catch (e) { }
    }

    function stopAllSfx() {
      stopSfx(SFX.panic);
      stopSfx(SFX.gameover);
    }

    function playSfx(audioObj) {
      if (!audioObj) return;
      try {
        audioObj.pause();
        audioObj.currentTime = 0;
      } catch (e) { }
      audioObj.play().catch(err => console.warn("Audio blocked:", err));
    }

    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTone(type) {
      ensureAudio();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";

      if (type === "ok") {
        o.frequency.setValueAtTime(660, t0);
        o.frequency.exponentialRampToValueAtTime(880, t0 + 0.08);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.18, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0); o.stop(t0 + 0.20);
      } else {
        o.frequency.setValueAtTime(220, t0);
        o.frequency.exponentialRampToValueAtTime(170, t0 + 0.10);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.16, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0); o.stop(t0 + 0.24);
      }
    }

    function playFinishFanfare() {
      ensureAudio();
      const t0 = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "triangle";
        const start = t0 + i * 0.07;
        const end = start + 0.20;
        o.frequency.setValueAtTime(f, start);
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.22, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, end);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(start); o.stop(end);
      });
    }

    /* =========================
       STUDENT LISTS
    ========================= */
    const STUDENTS = {
      H11: ["ELDRINE HILIM", "SYASYA HUMAIRAH BINTI MOHAMAD", "DEBRA JOYCE MOS ANAK DARIUS", "ELVIN BUAS", "NURUL QISTINA BINTI ROSSLAN", "NUR IMTINAN BINTI ABDULLAH", "JOSHUA IVAN JENIUS", "LYDIA CHONG TZE SHEN", "DAYANG NUR FITRI BINTI RATININ", "KHUZARATUL MAISARAH BINTI SYAMSUL", "MUHAMMAD FARID ZAKWAN BIN ABDUL HAMIT", "NARISON NABARA ANAK NORIHEN", "MARYYON LUDYYK ANAK NADIE", "STEFANNIE NATALLYSSA JOSEPH", "LEATRICIA LEONARD SANTANI", "OLLETHEA IVYE ORNEST", "WONG ZHI NING", "MEIRLYN MISU", "NUR BALQIS MAISARAH BINTI BOHARI", "NURUL AYU NAZIERA BINTI RAPE", "RACHEAL ANAK RAHMAN", "JEFFREY LAU JUN HONG", "MUHAMMAD SHAHZWAN", "SITI NURUSSAKIENAH BINTI RAMLIE"],
      H12: ["NIELEONA MAIE ANAK NINGKAN", "SITI NURJAYA BINTI HARON", "TIMOTI CRESPO JAYOM ANAK PETER", "VANESS DIOSLIN", "MUHAMMAD ALIFF HAQIMIE BIN ALIYAS", "NUR AMIRAH AZWANI BINTI AZMAN", "SHENNA LAI LAIHEE @ JEM", "HEIZER MLORRIE BAYRE", "SHIRLEY SCARLET SUNDAI ANAK SANI", "NUR AIEZA ZUREEN BINTI ABDULLAH", "NURFIFI ELLYANA BINTI ZAINUDIN", "WISHLEY JETIE ANAK GEORGE MARA", "RIANA NATASHA BINTI ROSMADI", "NUR DHANIAH KHAIRIAH BINTI ENDERA YUSUF", "LOUIS NGU YEN JUN", "CHRISDAH GRACE MARINUS", "SYAHINDAH ANNUR BINTI SANGKALA", "ALIECIA RISSE ANAK ALBERT", "ABBY QAIRINA BINTI SEMAN", "MUHAMMAD ALIFF BIN ANDY YAHIR", "BRENDA MELONIE JEMROL", "NUR FATIN SOFEA BINTI SONI", "ARIQ SHAFWAN BIN SUHARDI"],
      H02: ["ALAN TERRY ANAK TOMMY", "NUR AINA ZULAIKHA BINTI MORTADZA", "MOHD NORAZWAN BIN JALANI", "ERNILLA ZUEAMYRA BINTI ERWAN", "GRYCIE ARAVILLA JERRY", "PUTRI NUR SYUHADA", "NUR HANI BINTI MOHD AFFANDI", "SHAMIMIE SHAKILA BINTI ABDULLAH", "JUDD DARRYL SITOH", "WEE LIE TSHUNG", "AFIF SYAFIQ BIN HISHAM", "NUR FATIHAH ALIA BINTI ZULHALIM", "GERROND ALVIE MAXIMUS", "MOHAMAD ASLAM QAWI BIN MOHD SYAZANI", "HAIRIEL HADIF BIN MOHD SUFRI", "MELINDA JUPIRIN", "ELVERNA ENGELBERT", "WINNIE BONG SI QI", "LUCAS HUONG QI HAO", "ALDEN ANDREW", "MASLIANA BINTI MADSAE", "NORHAZRINIE BINTI ROBERT @ MOHD IRWAN", "JOVINIA BINTI JOSEPH"],
    };

    /* =========================
       QUESTION BANK
    ========================= */
    const BASE_QUESTIONS = [
      { key: "enzyme_specificity", stems: ["Why are enzymes highly specific in catalysis?", "Enzyme specificity mainly depends on what?", "What makes an enzyme recognise only its specific substrate?"], type: "single", options: [{ t: "Active site shape complements the substrate", correct: true }, { t: "Enzymes supply energy for the reaction", correct: false }, { t: "Enzymes permanently bind substrates", correct: false }, { t: "Enzymes change the product structure directly", correct: false }] },
      { key: "enzyme_denature", stems: ["Enzyme activity sharply decreases above optimum temperature because…", "When an enzyme is denatured, which change occurs?", "Why does enzyme efficiency decline when temperature is too high?"], type: "single", options: [{ t: "Active site structure is disrupted (denaturation)", correct: true }, { t: "Substrate melts and disappears", correct: false }, { t: "pH always increases drastically", correct: false }, { t: "Cofactor is consumed permanently", correct: false }] },
      { key: "respiration_most_atp", stems: ["Which stage of aerobic respiration yields the highest ATP?", "Most ATP molecules are generated in which step of respiration?", "Where is the bulk of ATP produced during aerobic respiration?"], type: "single", options: [{ t: "Electron transport chain / oxidative phosphorylation", correct: true }, { t: "Glycolysis", correct: false }, { t: "Link reaction", correct: false }, { t: "Krebs cycle", correct: false }] },
      { key: "oxygen_final_acceptor", stems: ["When oxygen is absent, the electron transport chain stops because…", "Oxidative phosphorylation requires oxygen because oxygen acts as…", "Without oxygen, ETC ceases because oxygen normally functions as…"], type: "single", options: [{ t: "The final electron acceptor", correct: true }, { t: "A coenzyme that donates electrons", correct: false }, { t: "A substrate for ATP synthase", correct: false }, { t: "An enzyme that breaks down glucose", correct: false }] },
      { key: "photolysis_psii", stems: ["Photolysis of water occurs at…", "Which photosynthetic complex splits water and releases oxygen?", "Water molecules are split during photosynthesis at…"], type: "single", options: [{ t: "Photosystem II (thylakoid membrane)", correct: true }, { t: "Calvin cycle (stroma)", correct: false }, { t: "Photosystem I only", correct: false }, { t: "Cytoplasm", correct: false }] },
      { key: "light_reaction_products", stems: ["Light-dependent reactions mainly function to…", "Select TWO outputs of the light-dependent reactions.", "Which are produced in light reactions and used in Calvin cycle? (Select TWO)"], type: "multi2", instruction: "Select TWO answers.", options: [{ t: "ATP", correct: true }, { t: "NADPH", correct: true }, { t: "Glucose (directly)", correct: false }, { t: "RuBP (directly)", correct: false }] },

    function mulberry32(seed) { let a = seed >>> 0; return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
    function hashString(str) { let h = 2166136261; for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
    function shuffle(arr, rnd = Math.random) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rnd() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

    function buildSet(setNo, rnd) {
      const stemRnd = mulberry32(hashString('W12_STEMS_' + setNo));
      const qList = BASE_QUESTIONS.map((q, idx) => {
        const stem = q.stems[(idx + Math.floor(stemRnd() * q.stems.length) + setNo) % q.stems.length];
        const options = shuffle(q.options, rnd).map(o => ({ ...o }));
        return { key: q.key, stem, type: q.type, instruction: q.instruction || null, options };
      });
      return shuffle(qList, rnd);
    }

    /* =========================
       STATE + DOM
    ========================= */
    const screen = document.getElementById('screen');
    const studentLabel = document.getElementById('studentLabel');
    const statusLabel = document.getElementById('statusLabel');
    const progressText = document.getElementById('progressText');
    const barFill = document.getElementById('barFill');
    const confetti = document.getElementById('confetti');

    const APP_STATE = {
      class: null, name: null, locked: false,
      setNo: null, rnd: null,
      questions: [], qIndex: 0, answers: [], score: 0,
      timerPanicPlayed: false,
      timerEndAt: null,
      timerIntervalId: null,
    };

    function storageKey() {
      const c = APP_STATE.class || '';
      const n = APP_STATE.name || '';
      return `W12QUIZ_ATTEMPT_${c}__${n}`;
    }
    function loadAttempt() {
      const raw = localStorage.getItem(storageKey());
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }
    function saveAttempt(payload) { localStorage.setItem(storageKey(), JSON.stringify(payload)); }

    function updateRight() {
      studentLabel.textContent = (APP_STATE.class && APP_STATE.name) ? `${APP_STATE.class} • ${APP_STATE.name}` : '—';

      if (APP_STATE.questions.length) {
        statusLabel.textContent = 'In progress';
        // progressText is updated by the timer per question
        barFill.style.width = `${(APP_STATE.qIndex / APP_STATE.questions.length) * 100}%`;
      } else {
        statusLabel.textContent = 'Not started';
        progressText.textContent = '—';
        barFill.style.width = '0%';
      }
    }

    function transitionTo(html) {
      screen.classList.add('out');
      setTimeout(() => {
        screen.innerHTML = html;
        screen.classList.remove('out');
      }, 160);
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
    function sorted(a) { return a.slice().sort((x, y) => x - y); }
    function arraysEqual(a, b) { if (a.length !== b.length) return false; for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false; return true; }
    function clamp2Selections(arr) { return arr.slice(0, 2); }

    /* =========================
       TIMER (per question)
    ========================= */
    const TIMER_PER_QUESTION_SEC = 20;
    function startTimerPerQuestion() {
      clearInterval(APP_STATE.timerIntervalId);
      stopAllSfx(); // 🔴 ADD THIS LINE

      APP_STATE.timerPanicPlayed = false;
      APP_STATE.timerEndAt = Date.now() + TIMER_PER_QUESTION_SEC * 1000;
      APP_STATE.timerPanicPlayed = false;
      APP_STATE.timerEndAt = Date.now() + TIMER_PER_QUESTION_SEC * 1000;

      APP_STATE.timerIntervalId = setInterval(() => {
        const remainingMs = Math.max(0, APP_STATE.timerEndAt - Date.now());
        const sec = Math.ceil(remainingMs / 1000);

        progressText.textContent = `${APP_STATE.qIndex + 1} / ${APP_STATE.questions.length} • ⏱ ${sec}s`;

        if (!APP_STATE.timerPanicPlayed && sec <= 5 && sec > 0) {
          APP_STATE.timerPanicPlayed = true;
          playSfx(SFX.panic);
        }

        if (remainingMs <= 0) {
          clearInterval(APP_STATE.timerIntervalId);

          stopSfx(SFX.panic);        // 🔴 ADD THIS
          playSfx(SFX.gameover);     // 🔴 FIX THIS TOO (see note below)

          if (APP_STATE.qIndex < APP_STATE.questions.length - 1) {
            APP_STATE.qIndex++;
            renderQuestion();
          } else {
            submitQuiz();
          }
        }
      }, 200);
    }

    /* =========================
       SCREENS
    ========================= */
    function wireStartScreen() {
      const hanisBtn = document.getElementById('hanisBtn');
      const otherBtn = document.getElementById('otherBtn');
      const hanisBox = document.getElementById('hanisBox');
      const otherBox = document.getElementById('otherBox');
      const classSel = document.getElementById('classSel');
      const nameSel = document.getElementById('nameSel');
      const otherClass = document.getElementById('otherClass');
      const otherName = document.getElementById('otherName');
      const startBtn = document.getElementById('startBtn');
      const msgBox = document.getElementById('msgBox');
      const howBtn = document.getElementById('howBtn');

      if (!hanisBtn || !otherBtn || !startBtn || !msgBox) {
        console.warn('Start screen wiring failed: missing elements');
        return;
      }

      // reset state
      APP_STATE.class = null;
      APP_STATE.name = null;
      APP_STATE.locked = false;
      updateRight();

      function setReadyMessage() {
        msgBox.innerHTML = `<div class="okbox">✅ Ready! After you start, your set is locked and you only have one attempt.</div>`;
      }
      function setLockedMessage(attempt) {
        msgBox.innerHTML = `<div class="warn"><b>Locked.</b> You already submitted this quiz earlier.<br>Score recorded: <b>${attempt.score}/${attempt.total}</b> • Set: <b>${attempt.setNo ?? '—'}</b></div>`;
      }

      function checkLockAndToggleStart() {
        const attempt = loadAttempt();
        if (attempt?.submitted) {
          APP_STATE.locked = true;
          startBtn.disabled = true;
          setLockedMessage(attempt);
        } else {
          APP_STATE.locked = false;
          startBtn.disabled = !(APP_STATE.class && APP_STATE.name);
          if (APP_STATE.class && APP_STATE.name) setReadyMessage();
        }
      }

      hanisBtn.addEventListener('click', () => {
        hanisBox.classList.remove('hide');
        otherBox.classList.add('hide');
        if (otherClass) otherClass.value = '';
        if (otherName) otherName.value = '';
        if (classSel) classSel.value = '';
        if (nameSel) {
          nameSel.disabled = true;
          nameSel.innerHTML = `<option value="" selected disabled>Choose name…</option>`;
        }
        APP_STATE.class = null;
        APP_STATE.name = null;
        msgBox.innerHTML = '';
        startBtn.disabled = true;
        updateRight();
      });

      otherBtn.addEventListener('click', () => {
        otherBox.classList.remove('hide');
        hanisBox.classList.add('hide');
        if (classSel) classSel.value = '';
        if (nameSel) {
          nameSel.disabled = true;
          nameSel.innerHTML = `<option value="" selected disabled>Choose name…</option>`;
        }
        APP_STATE.class = null;
        APP_STATE.name = null;
        msgBox.innerHTML = '';
        startBtn.disabled = true;
        updateRight();
      });

      if (classSel && nameSel) {
        classSel.addEventListener('change', () => {
          APP_STATE.class = classSel.value;
          nameSel.disabled = false;
          nameSel.innerHTML = `<option value="" selected disabled>Choose name…</option>` +
            (STUDENTS[APP_STATE.class] || []).map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
          APP_STATE.name = null;
          msgBox.innerHTML = '';
          startBtn.disabled = true;
          updateRight();
        });

        nameSel.addEventListener('change', () => {
          APP_STATE.name = nameSel.value;
          updateRight();
          checkLockAndToggleStart();
        });
      }

      function handleOtherTyping() {
        const c = otherClass?.value?.trim();
        const n = otherName?.value?.trim();
        APP_STATE.class = c || null;
        APP_STATE.name = n || null;
        updateRight();
        checkLockAndToggleStart();
      }
      otherClass?.addEventListener('input', handleOtherTyping);
      otherName?.addEventListener('input', handleOtherTyping);

      howBtn?.addEventListener('click', () => {
        msgBox.innerHTML = `<div class="okbox"><b>How it works:</b><br>• You’ll get 20 questions.<br>• The system assigns you a random <b>Set 1–10</b>.<br>• Options are shuffled 😌<br>• Some are <b>Select TWO</b>.<br>• End page shows your score — screenshot it and send to class group.</div>`;
      });

      startBtn.addEventListener('click', () => {
        // unlock audio on a real user interaction
        ensureAudio();
        playSfx(SFX.panic); // quick unlock
        SFX.panic.pause();
        SFX.panic.currentTime = 0;

        startQuiz();
      });
    }

    function renderStart() {
      APP_STATE.questions = [];
      APP_STATE.qIndex = 0;
      APP_STATE.answers = [];
      APP_STATE.score = 0;
      updateRight();

      transitionTo(`
    <div class="qwrap">
      <p class="kicker"><span class="pill">✨ Hello bestie</span></p>
      <h2 class="qtitle">Before we start… choose your student type 👇</h2>
      <p class="hint">⚠️ One attempt only. Don’t refresh when you’re answering.</p>

      <label>You are…</label>
      <div class="footerRow">
        <button class="ghost" id="hanisBtn" type="button">Miss Hanis students</button>
        <button class="ghost" id="otherBtn" type="button">Other classes</button>
      </div>

      <div id="hanisBox" class="swooshIn hide">
        <label>Class</label>
        <select id="classSel">
          <option value="" selected disabled>Choose class…</option>
          <option value="H11">H11</option>
          <option value="H12">H12</option>
          <option value="H02">H02</option>
        </select>

        <label>Name</label>
        <select id="nameSel" disabled>
          <option value="" selected disabled>Choose name…</option>
        </select>
      </div>

      <div id="otherBox" class="swooshIn hide">
        <label>Your class</label>
        <input id="otherClass" placeholder="Example: H10 / T02 / H03" />

        <label>Your name</label>
        <input id="otherName" placeholder="Example: Aina Binti Ahmad" />
        <p class="hint">Tip: Please type full name for record.</p>
      </div>

      <div class="footerRow">
        <button class="ghost" id="howBtn" type="button">How it works</button>
        <button id="startBtn" type="button" disabled>Start W12 Quiz</button>
      </div>

      <div id="msgBox"></div>
    </div>
  `);

      setTimeout(wireStartScreen, 170);
    }

    function startQuiz() {
      if (!APP_STATE.class || !APP_STATE.name) return;

      const studentSeed = hashString(`W12_${APP_STATE.class}_${APP_STATE.name}_${new Date().toDateString()}`);
      const rnd = mulberry32(studentSeed);
      const setNo = 1 + Math.floor(rnd() * 10);

      APP_STATE.setNo = setNo;
      APP_STATE.rnd = rnd;
      APP_STATE.questions = buildSet(setNo, rnd);
      APP_STATE.qIndex = 0;
      APP_STATE.answers = Array(APP_STATE.questions.length).fill(null);
      APP_STATE.score = 0;

      const attempt = loadAttempt();
      if (attempt?.submitted) {
        renderLocked(attempt);
        return;
      }

      saveAttempt({ submitted: false, startedAt: Date.now(), total: APP_STATE.questions.length, setNo });
      updateRight();
      renderQuestion();
    }

    function renderLocked(attempt) {
      transitionTo(`
    <div class="qwrap">
      <h2 class="qtitle">This attempt is locked 🔒</h2>
      <p class="hint">You already submitted earlier.</p>
      <div class="finalCard">
        <div class="scoreBig">${attempt.score} / ${attempt.total}</div>
        <p class="scoreSub"><b>${escapeHtml(APP_STATE.name || '')}</b> • ${escapeHtml(APP_STATE.class || '')}</p>
      </div>
      <div class="warn">If you think this is an error, show Miss Hanisu your proof (screenshot).</div>
      <div class="footerRow">
        <button class="ghost" onclick="location.reload()">Reload</button>
        <button disabled>Start</button>
      </div>
    </div>
  `);
    }

    function renderQuestion() {
      const q = APP_STATE.questions[APP_STATE.qIndex];
      updateRight();
      startTimerPerQuestion();

      const isMulti = q.type === 'multi2';
      const instr = q.instruction
        ? `<p class="hint"><b>${escapeHtml(q.instruction)}</b></p>`
        : `<p class="hint">${isMulti ? '<b>Select TWO answers.</b>' : 'Choose ONE answer.'}</p>`;

      const selected = APP_STATE.answers[APP_STATE.qIndex] || [];

      transitionTo(`
    <div class="qwrap">
      <div class="chips">
        <span class="chip">Question ${APP_STATE.qIndex + 1} / ${APP_STATE.questions.length}</span>
        <span class="chip">${isMulti ? 'Select TWO' : 'Single answer'}</span>
      </div>
      <h2 class="qtitle">${escapeHtml(q.stem)}</h2>
      ${instr}
      <div class="choices" id="choices"></div>
      <div class="footerRow">
        <button class="ghost" id="backBtn" type="button" ${APP_STATE.qIndex === 0 ? 'disabled' : ''}>Back</button>
        <button id="nextBtn" type="button" disabled>${APP_STATE.qIndex === APP_STATE.questions.length - 1 ? 'Submit' : 'Next'}</button>
      </div>
      <div class="tiny">Choose carefully — one attempt only 👀</div>
    </div>
  `);

      setTimeout(() => {
        const choicesEl = document.getElementById('choices');
        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');

        q.options.forEach((opt, idx) => {
          const letter = String.fromCharCode(65 + idx);
          const div = document.createElement('div');
          div.className = 'choice' + (selected.includes(idx) ? ' selected' : '');
          div.innerHTML = `<div class="bubble">${letter}</div><div>${escapeHtml(opt.t)}</div>`;

          div.addEventListener('click', () => {
            let sel = APP_STATE.answers[APP_STATE.qIndex] || [];
            sel = sel.slice();

            if (isMulti) {
              if (sel.includes(idx)) sel = sel.filter(x => x !== idx);
              else { sel.push(idx); sel = clamp2Selections(sel); }
            } else {
              sel = [idx];
            }

            APP_STATE.answers[APP_STATE.qIndex] = sel;
            [...choicesEl.children].forEach((child, cIdx) => child.classList.toggle('selected', sel.includes(cIdx)));
            nextBtn.disabled = isMulti ? (sel.length !== 2) : (sel.length !== 1);
          });

          choicesEl.appendChild(div);
        });

        nextBtn.disabled = isMulti ? (selected.length !== 2) : (selected.length !== 1);

        backBtn?.addEventListener('click', () => {
          clearInterval(APP_STATE.timerIntervalId);
          APP_STATE.qIndex--;
          renderQuestion();
        });

        nextBtn.addEventListener("click", () => {
          clearInterval(APP_STATE.timerIntervalId);
          stopSfx(SFX.panic); // 🔴 ADD THIS
          const correctIdx = q.options.map((o, i) => ({ o, i })).filter(x => x.o.correct).map(x => x.i);
          const sel = APP_STATE.answers[APP_STATE.qIndex] || [];
          const isCorrect = arraysEqual(sorted(sel), sorted(correctIdx));
          playTone(isCorrect ? 'ok' : 'bad');

          if (APP_STATE.qIndex < APP_STATE.questions.length - 1) {
            APP_STATE.qIndex++;
            renderQuestion();
          } else {
            submitQuiz();
          }
        });
      }, 170);
    }

    function submitQuiz() {
      clearInterval(APP_STATE.timerIntervalId);

      let score = 0;
      APP_STATE.questions.forEach((q, qi) => {
        const sel = APP_STATE.answers[qi] || [];
        const correctIdx = q.options.map((o, i) => ({ o, i })).filter(x => x.o.correct).map(x => x.i);
        if (arraysEqual(sorted(sel), sorted(correctIdx))) score += 1;
      });
      APP_STATE.score = score;

      saveAttempt({ submitted: true, submittedAt: Date.now(), score, total: APP_STATE.questions.length, setNo: APP_STATE.setNo });
      renderFinal();
    }

    function burstConfetti() {
      confetti.innerHTML = '';
      const colors = ['#ff6f91', '#ff9671', '#ffd166', '#06d6a0', '#4cc9f0', '#f4a7c1'];
      const count = 90;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('i');
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.top = (-10 - Math.random() * 20) + 'px';
        el.style.width = (8 + Math.random() * 6) + 'px';
        el.style.height = (10 + Math.random() * 10) + 'px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = (Math.random() * 0.3) + 's';
        el.style.animationDuration = (1.3 + Math.random() * 0.9) + 's';
        confetti.appendChild(el);
      }
      setTimeout(() => { confetti.innerHTML = ''; }, 2400);
    }

    function scoreMessage(score, total) {
      const pct = (score / total) * 100;
      if (pct >= 90) return { title: 'Slayyyy 😭✨', subtitle: 'That was clean. Screenshot and send it to your class group.' };
      if (pct >= 75) return { title: 'Nice work 💖', subtitle: 'Good job. Screenshot and send it to your class group.' };
      if (pct >= 50) return { title: 'Okayyy we move 😌', subtitle: 'Not bad. Screenshot and send it to your class group.' };
      return { title: 'It’s okay bestie 😭', subtitle: 'Try to review the topic after this. Screenshot and send it to your class group.' };
    }

    function renderFinal() {
      updateRight();
      barFill.style.width = '100%';
      progressText.textContent = `${APP_STATE.questions.length} / ${APP_STATE.questions.length}`;
      statusLabel.textContent = 'Submitted';

      burstConfetti();
      playFinishFanfare();

      const message = scoreMessage(APP_STATE.score, APP_STATE.questions.length);

      transitionTo(`
    <div class="qwrap">
      <div class="chips">
        <span class="chip">✅ Completed</span>
        <span class="chip">🔒 Locked</span>
        <span class="chip">📸 Screenshot</span>
      </div>
      <h2 class="qtitle">${message.title}</h2>
      <p class="hint">${message.subtitle}</p>

      <div class="finalCard">
        <div class="scoreBig">${APP_STATE.score} / ${APP_STATE.questions.length}</div>
        <p class="scoreSub"><b>${escapeHtml(APP_STATE.name)}</b> • ${escapeHtml(APP_STATE.class)}</p>
